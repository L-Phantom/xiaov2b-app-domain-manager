mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: "127.0.0.1:9090"
unified-delay: true
tcp-concurrent: true

experimental:
  ignore-resolve-fail: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, "8080-8880"]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.push.apple.com"
    - "Mijia Cloud"

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "*.msftncsi.com"
    - "www.msftconnecttest.com"
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"
  nameserver-policy:
    "geosite:cn":
      - "https://doh.pub/dns-query"
      - "https://dns.alidns.com/dns-query"
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"
  proxy-server-nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"

proxies:

proxy-groups:
  - name: "$app_name"
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - DIRECT

  - name: "自动选择"
    type: url-test
    proxies: []
    url: "http://www.gstatic.com/generate_204"
    interval: 600
    tolerance: 100
    lazy: true

  - name: "故障转移"
    type: fallback
    proxies: []
    url: "http://www.gstatic.com/generate_204"
    interval: 600
    lazy: true

  - name: "Apple"
    type: select
    proxies:
      - DIRECT
      - "$app_name"
      - 自动选择
      - 故障转移

  - name: "BiliBili"
    type: select
    proxies:
      - DIRECT
      - "$app_name"
      - 自动选择
      - 故障转移

  - name: "Media"
    type: select
    proxies:
      - "$app_name"
      - 自动选择
      - 故障转移
      - DIRECT

  - name: "OpenAI"
    type: select
    proxies:
      - "$app_name"
      - 自动选择
      - 故障转移
      - DIRECT

  - name: "Telegram"
    type: select
    proxies:
      - "$app_name"
      - 自动选择
      - 故障转移
      - DIRECT

  - name: "Google"
